name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"; echo "$unformatted"; exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Integration tests skip themselves automatically when PWNDOC_URL is unset.
      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...
